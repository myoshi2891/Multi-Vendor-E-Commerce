-- pgloader 設定ファイル
-- 使用方法: pgloader docs/migration/pgloader.conf
--
-- 注意: 接続先の認証情報はご自身の環境に合わせて変更してください。

LOAD DATABASE
  FROM mysql://<YOUR_MYSQL_USER>:<YOUR_MYSQL_PASSWORD>@localhost:3306/multivendor_ecommerce
  INTO postgresql://<YOUR_NEON_USER>:<YOUR_NEON_PASSWORD>@ep-xxxx.neon.tech/multivendor_ecommerce?sslmode=require

-- ⚠ 危険: `include drop` は接続先 PostgreSQL の既存テーブルを CASCADE で全て DROP します。
-- 誤った接続先を指定すると本番データが完全に失われます。
-- 実行前に必ず INTO 句の接続先を確認し、バックアップを取得してください。
-- 詳細: docs/migration/01-data-migration-guide.md の [!WARNING] ブロックを参照。
-- 安全策: 初回テストでは `include drop` を削除して実行を検討してください。
WITH include drop, create tables, create indexes,
     reset sequences, downcase identifiers

CAST type longtext to text,
     type tinyint  to boolean using tinyint-to-boolean

-- _prisma_migrations テーブルは MySQL 固有のため除外
EXCLUDING TABLE NAMES MATCHING '_prisma_migrations'
;
