# Integration テスト用 PostgreSQL サービス定義
#
# 用途:
#   - testcontainers が利用できない環境 (Docker daemon を直接叩けない CI runner や
#     一部の開発者環境) での fallback として常駐 Postgres を提供する
#   - `.env.test` で `DATABASE_URL=postgresql://test:test@localhost:55432/integration_test`
#     と `INTEGRATION_DB_ALLOW_EXTERNAL=1` を指定すると
#     `tests/integration/setup/container.ts` の `globalSetup` が
#     testcontainers の起動をスキップしてこのサービスへ接続する。
#     (オプトインフラグが無い、または DB 名に test/integration を含まない場合は
#      実 DB 誤接続防止のため globalSetup が throw する)
#
# 起動方法:
#   docker compose -f docker-compose.test.yml up -d
#
# 停止方法:
#   docker compose -f docker-compose.test.yml down -v
#
# 関連 ADR: docs/architecture/decisions/004-integration-test-db-strategy.md

services:
  postgres-test:
    # postgres:16.14 (digest を指定して supply-chain を固定。
    # 既存 .github/workflows/ci.yml の seed-idempotency / visual-baselines ジョブと同じイメージ)
    image: postgres@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae
    container_name: multivendor-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: integration_test
    ports:
      # 開発 DB (5432) と衝突しないよう 55432 でホストへ公開
      - "55432:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d integration_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-test-data:
