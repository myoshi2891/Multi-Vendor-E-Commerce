# SonarQube / SonarCloud scanner 設定
#
# 用途:
#   CI (SonarCloud) とローカル (docker-compose.sonar.yml + sonar-scanner-cli) の両方で
#   このファイルが解析対象・カバレッジ入力を定義する。
#
# 前提:
#   下記 sonar.organization / sonar.projectKey は SonarCloud で発行された実値に置き換えること
#   (Organization Key / Project Key)。SONAR_TOKEN は CI Secrets / ローカル環境変数で渡す。
#   sonar.host.url はスキャナ起動側で指定する (SonarCloud は action 既定、ローカルは
#   SONAR_HOST_URL=http://localhost:9000)。本ファイルには書かない。

sonar.organization=REPLACE_WITH_SONARCLOUD_ORG_KEY
sonar.projectKey=REPLACE_WITH_SONARCLOUD_PROJECT_KEY
sonar.projectName=Multi-Vendor E-Commerce

# --- 解析対象 ---
sonar.sources=src
sonar.tests=src,tests/component,tests/integration,scripts
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,tests/**/*.test.ts,tests/**/*.test.tsx,scripts/**/*.test.ts

# --- カバレッジ ---
# jest.config.js の collectCoverageFrom 除外と一致させ、カバレッジ分母を揃える
# (型・定数・テストインフラ・純表示 SVG・純 RSC ラッパーを二重に未カバレッジ計上しない)
sonar.coverage.exclusions=src/types/**,src/constants/**,src/data/**,src/config/**,src/migration-scripts/**,src/**/icons/**,src/app/**/layout.tsx,src/app/**/loading.tsx,src/app/**/error.tsx,src/app/**/not-found.tsx,src/app/**/template.tsx,src/app/**/page.tsx

# Jest が出力する lcov を取り込む (coverageReporters: ["lcov", ...])
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
