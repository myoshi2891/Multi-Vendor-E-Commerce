name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Stub credentials so Clerk/Stripe/Prisma module-load succeeds during lint/test/build.
# Real keys are only required for E2E or visual baseline jobs (handled separately).
env:
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci-stub
  CLERK_SECRET_KEY: sk_test_ci-stub
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
  NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
  WEBHOOK_SECRET: whsec_ci-stub
  STRIPE_SECRET_KEY: sk_test_ci-stub
  STRIPE_WEBHOOK_SECRET: whsec_ci-stub
  NEXT_PUBLIC_STRIPE_PUBLIC_KEY: pk_test_ci-stub
  NEXT_PUBLIC_PAYPAL_CLIENT_ID: ci-stub
  PAYPAL_SECRET: ci-stub
  NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-stub
  NEXT_PUBLIC_CLOUDINARY_PRESET_NAME: ci-stub
  DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
  DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
  NEXT_PUBLIC_APP_URL: http://localhost:3000

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run ESLint
        run: bun run lint

  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run Jest
        # Temporary --verbose for modal-provider flake diagnostics; --ci suppresses snapshot writes.
        # --coverage で coverage/lcov.info を生成し、後続の sonarcloud ジョブへ artifact 経由で渡す。
        run: bunx jest --verbose --ci --coverage
      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 1
      - name: Regenerate coverage dashboard
        # 直前の jest --coverage が生成した coverage/lcov.info を取り込み
        # docs/coverage-dashboard.html を再生成する (tsx はインストール済み)。
        # artifact 化のみ — リポジトリへの自動コミットはしない (generatedAt が
        # 実行ごとに変わり churn の原因になるため。詳細は COVERAGE_REPORT §3 B4)。
        run: bun run coverage:dashboard
      - name: Upload coverage dashboard (html)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-dashboard
          path: docs/coverage-dashboard.html
          if-no-files-found: error
          retention-days: 7

  # SonarCloud 静的解析 — 初期は非ブロッキング (continue-on-error: true)。
  # test ジョブが生成した coverage/lcov.info を artifact から復元して送信する。
  # SONAR_TOKEN 未登録なら scan ステップを skip し、CI 全体は緑のまま。
  # secrets コンテキストは if: で直接参照できないため、job-level env に代入し
  # step-level の `if: env.SONAR_TOKEN != ''` で判定する (GitHub Actions の定石)。
  sonarcloud:
    name: SonarCloud Scan
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          # SonarCloud の blame / New Code 判定には全履歴が必要
          fetch-depth: 0
      - name: Download coverage (lcov)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-lcov
          path: coverage
      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Build
        run: bun run build

  # Integration tests — testcontainers が GitHub Actions runner の Docker daemon を直接
  # 利用するため `services:` ブロックは不要。tests/integration/setup/container.ts の
  # globalSetup で PostgreSqlContainer を起動し、prisma migrate deploy を実行する。
  # 関連: docs/architecture/decisions/004-integration-test-db-strategy.md
  integration-tests:
    name: Integration Tests (Jest + testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run Jest (integration)
        # DATABASE_URL を空に上書きして testcontainers モードを強制する
        # (env: ブロックで stub URL がセットされているため、空文字列で明示的にクリア)
        env:
          DATABASE_URL: ""
          DIRECT_URL: ""
        run: bunx jest --config jest.integration.config.js --ci

  # OI-5: Verify that `bun run seed:e2e` is idempotent on a fresh DB.
  # Runs the seed twice and asserts that User/Product/ProductVariant
  # row counts remain identical between runs.
  seed-idempotency:
    name: E2E Seed Idempotency
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae # postgres:16.14
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
      DIRECT_URL: postgresql://e2e:e2e@localhost:5432/e2e
      E2E_DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
      PGPASSWORD: e2e
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
      - name: First seed
        run: bun run seed:e2e
      - name: Snapshot row counts (before)
        run: |
          psql -h localhost -U e2e -d e2e -At -F, -c \
            'SELECT (SELECT COUNT(*) FROM "User"),
                    (SELECT COUNT(*) FROM "Product"),
                    (SELECT COUNT(*) FROM "ProductVariant");' \
            > before.txt
          cat before.txt
      - name: Second seed (idempotency check)
        run: bun run seed:e2e
      - name: Snapshot row counts (after)
        run: |
          psql -h localhost -U e2e -d e2e -At -F, -c \
            'SELECT (SELECT COUNT(*) FROM "User"),
                    (SELECT COUNT(*) FROM "Product"),
                    (SELECT COUNT(*) FROM "ProductVariant");' \
            > after.txt
          cat after.txt
      - name: Assert counts unchanged
        run: diff before.txt after.txt

  # Manually-triggered job that generates -linux.png Playwright snapshots
  # and opens a PR with the new baselines. Run via:
  #   gh workflow run ci.yml --ref <branch>
  visual-baselines:
    name: Generate Linux Visual Baselines
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    services:
      postgres:
        image: postgres@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae # postgres:16.14
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
      DIRECT_URL: postgresql://e2e:e2e@localhost:5432/e2e
      E2E_DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit
      - name: Seed E2E data
        run: bun run seed:e2e
      - name: Update visual baselines
        run: bunx playwright test tests/e2e/visual --update-snapshots
      - name: Open PR with new baselines
        uses: peter-evans/create-pull-request@6d6857d36972b65feb161a90e484f2984215f83e # v6.0.5
        with:
          commit-message: "test(visual): update Linux baselines"
          title: "chore(visual): add -linux.png baselines"
          body: |
            Auto-generated by `visual-baselines` workflow.

            Linux baselines for Playwright visual regression specs in
            `tests/e2e/visual/`. Review and merge to enable Linux CI runs.
          branch: chore/visual-baselines-linux
          add-paths: tests/e2e/visual/**/*-linux.png
          delete-branch: true
