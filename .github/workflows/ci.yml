name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Stub credentials so Clerk/Stripe/Prisma module-load succeeds during lint/test/build.
# Real keys are only required for E2E or visual baseline jobs (handled separately).
env:
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci-stub
  CLERK_SECRET_KEY: sk_test_ci-stub
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
  NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
  WEBHOOK_SECRET: whsec_ci-stub
  STRIPE_SECRET_KEY: sk_test_ci-stub
  STRIPE_WEBHOOK_SECRET: whsec_ci-stub
  NEXT_PUBLIC_STRIPE_PUBLIC_KEY: pk_test_ci-stub
  NEXT_PUBLIC_PAYPAL_CLIENT_ID: ci-stub
  PAYPAL_SECRET: ci-stub
  NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-stub
  NEXT_PUBLIC_CLOUDINARY_PRESET_NAME: ci-stub
  DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
  DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
  NEXT_PUBLIC_APP_URL: http://localhost:3000

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run ESLint
        run: bun run lint

  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run Jest
        run: bun run test

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Build
        run: bun run build

  # OI-5: Verify that `bun run seed:e2e` is idempotent on a fresh DB.
  # Runs the seed twice and asserts that User/Product/ProductVariant
  # row counts remain identical between runs.
  seed-idempotency:
    name: E2E Seed Idempotency
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
      DIRECT_URL: postgresql://e2e:e2e@localhost:5432/e2e
      E2E_DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
      PGPASSWORD: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
      - name: First seed
        run: bun run seed:e2e
      - name: Snapshot row counts (before)
        run: |
          psql -h localhost -U e2e -d e2e -At -F, -c \
            'SELECT (SELECT COUNT(*) FROM "User"),
                    (SELECT COUNT(*) FROM "Product"),
                    (SELECT COUNT(*) FROM "ProductVariant");' \
            > before.txt
          cat before.txt
      - name: Second seed (idempotency check)
        run: bun run seed:e2e
      - name: Snapshot row counts (after)
        run: |
          psql -h localhost -U e2e -d e2e -At -F, -c \
            'SELECT (SELECT COUNT(*) FROM "User"),
                    (SELECT COUNT(*) FROM "Product"),
                    (SELECT COUNT(*) FROM "ProductVariant");' \
            > after.txt
          cat after.txt
      - name: Assert counts unchanged
        run: diff before.txt after.txt

  # Manually-triggered job that generates -linux.png Playwright snapshots
  # and opens a PR with the new baselines. Run via:
  #   gh workflow run ci.yml --ref <branch>
  visual-baselines:
    name: Generate Linux Visual Baselines
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
      DIRECT_URL: postgresql://e2e:e2e@localhost:5432/e2e
      E2E_DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit
      - name: Seed E2E data
        run: bun run seed:e2e
      - name: Update visual baselines
        run: bunx playwright test tests/e2e/visual --update-snapshots
      - name: Open PR with new baselines
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "test(visual): update Linux baselines"
          title: "chore(visual): add -linux.png baselines"
          body: |
            Auto-generated by `visual-baselines` workflow.

            Linux baselines for Playwright visual regression specs in
            `tests/e2e/visual/`. Review and merge to enable Linux CI runs.
          branch: chore/visual-baselines-linux
          add-paths: tests/e2e/visual/**/*-linux.png
          delete-branch: true
