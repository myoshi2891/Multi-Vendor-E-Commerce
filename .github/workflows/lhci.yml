name: Lighthouse CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# 公開ストアフロント (/ , /browse) のパフォーマンス予算化。ストアフロントは
# force-dynamic で Prisma に到達するため、ci.yml の seed-idempotency と同じく
# Postgres service → migrate → seed → build → next start のフルスタックで計測する。
# Clerk は <ClerkProvider> がルートレイアウトに乗るため、構文的に正当なダミー
# publishable key を渡す (pk_test_ + base64("example.clerk.accounts.dev$"))。
# stub の pk_test_ci-stub は非 base64 形式で実行時に全ページが 500 するため使えない。
env:
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
  CLERK_SECRET_KEY: sk_test_ci-stub
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
  NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
  WEBHOOK_SECRET: whsec_ci-stub
  STRIPE_SECRET_KEY: sk_test_ci-stub
  STRIPE_WEBHOOK_SECRET: whsec_ci-stub
  NEXT_PUBLIC_STRIPE_PUBLIC_KEY: pk_test_ci-stub
  NEXT_PUBLIC_PAYPAL_CLIENT_ID: ci-stub
  PAYPAL_SECRET: ci-stub
  NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-stub
  NEXT_PUBLIC_CLOUDINARY_PRESET_NAME: ci-stub
  DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
  DIRECT_URL: postgresql://e2e:e2e@localhost:5432/e2e
  E2E_DATABASE_URL: postgresql://e2e:e2e@localhost:5432/e2e
  PGPASSWORD: e2e
  NEXT_PUBLIC_APP_URL: http://localhost:3000

concurrency:
  group: lhci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse (performance budget)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae # postgres:16.14
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
      - name: Seed E2E data
        run: bun run seed:e2e
      - name: Build
        run: bun run build
      - name: Run Lighthouse CI
        # .lighthouserc.json の startServerCommand (bun run start = next start) で
        # 本番ビルドを配信し、/ と /browse を 3 回計測する。assertions は warn-only の
        # ため、予算逸脱でもジョブは success のまま (ベースライン観測フェーズ)。
        run: bunx lhci autorun
